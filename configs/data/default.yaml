# Data Configuration: Default

name: default

# ============================================================================
# Dataset Settings
# ============================================================================
dataset:
  name: "door_episodes"
  path: ${paths.data}/processed

  # Dummy dataset configuration (used only when explicitly setting name="dummy")
  dummy:
    train_samples: 10000
    val_samples: 500
    state_dim: 256

  # Door episode manifest contract:
  #   ${path}/train_manifest.json
  #   ${path}/val_manifest.json
  # Each record points to a .pt/.pth/.npz sample with:
  #   input_ids, attention_mask, robot_states, action_chunks,
  #   chunk_masks, text_labels, and optional pixel_values/image_grid_thw.
  # attention_mask may be text-only or full text+state+action length; the
  # dataset normalizes it to the full VLA sequence.
  schema: "vla_door_episode_v1"

  # Split ratios (if creating splits)
  train_split: 0.95
  val_split: 0.05

  # Sequence settings
  max_length: ${model.architecture.max_seq_length}

  # Preprocessing
  preprocessing:
    normalize: true
    augment: false

# ============================================================================
# DataLoader Settings
# ============================================================================
dataloader:
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true

  # Shuffling
  shuffle_train: true
  shuffle_val: false

  # Drop last incomplete batch (important for distributed)
  drop_last: true

# ============================================================================
# Caching
# ============================================================================
cache:
  enabled: true
  path: ${paths.data}/cache
  max_cache_size_gb: 50
